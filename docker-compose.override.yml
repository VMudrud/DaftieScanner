services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    user: root
    working_dir: /home/dynamodblocal
    # Default: persistent storage in the dynamodb-data volume.
    # Override DYNAMODB_LOCAL_FLAGS=-inMemory in .env for ephemeral runs.
    command: "-jar DynamoDBLocal.jar -sharedDb ${DYNAMODB_LOCAL_FLAGS:--dbPath ./data}"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 -o /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: .
    env_file: .env
    environment:
      DAFT_DYNAMO_ENDPOINT: http://dynamodb-local:8000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      DAFT_MAIL_FROM: noreply@daftie.scanner
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "5005:5005"

volumes:
  dynamodb-data:
