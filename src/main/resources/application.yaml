spring:
  application:
    name: daftiescanner
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      cloudwatch:
        namespace: DaftieScanner
        step: 1m
        enabled: ${MANAGEMENT_METRICS_EXPORT_CLOUDWATCH_ENABLED:false}

daft:
  dynamo:
    endpoint: ${DAFT_DYNAMO_ENDPOINT:}
  scanner:
    base-delay-seconds: 60
    jitter-min-seconds: 40
    jitter-range-seconds: 40
    force-cold-start: ${DAFT_FORCE_COLD_START:false}
  mail:
    from: ${DAFT_MAIL_FROM:noreply@daftie.scanner}
  telegram:
    token: ${DAFT_TELEGRAM_TOKEN:}
    api-base: ${DAFT_TELEGRAM_API_BASE:https://api.telegram.org}
    poll-timeout-seconds: 25
    admin-contact: ${DAFT_TELEGRAM_ADMIN_CONTACT:Unknown}

# Tenant configuration example.
# Override TENANTS_ACTIVE and TENANT_N_* via environment variables or .env file.
# TENANT_N_NOTIFIERS is a comma-separated list; supported values: email, telegram, logging
tenants:
  active: ${TENANTS_ACTIVE:}

# Sample tenant — override all TENANT_1_* via environment or .env
tenant:
  "1":
    enabled: ${TENANT_1_ENABLED:false}
    email: ${TENANT_1_EMAIL:noreply@example.com}
    section: ${TENANT_1_SECTION:residential-to-rent}
    rental-price-min: ${TENANT_1_RENTAL_PRICE_MIN:0}
    rental-price-max: ${TENANT_1_RENTAL_PRICE_MAX:0}
    num-beds-min: ${TENANT_1_NUM_BEDS_MIN:}
    num-beds-max: ${TENANT_1_NUM_BEDS_MAX:}
    # stored-shape-ids: daft.ie geo location IDs (a list). Sent as
    # GeoFilter.storedShapeIds in the search request. Each ID maps to a named area;
    # combine several to scan multiple areas at once, e.g. ["42","43"] = North + South Co. Dublin.
    # Full id -> location mapping: docs/aucocomplete.json. Common IDs:
    #
    #   Region / city level
    #     1    Dublin (County)        33   Dublin City        4410 Dublin City Centre
    #     40   North Dublin City      41   South Dublin City
    #     42   North Co. Dublin       43   South Co. Dublin
    #     44   West Co. Dublin        45   Dublin Commuter Towns
    #
    #   Dublin postal districts
    #     65 D1   66 D2   67 D3   68 D4   69 D5   70 D6   71 D6W  72 D7
    #     73 D8   74 D9   75 D10  76 D11  77 D12  78 D13  79 D14  80 D15
    #     81 D16  82 D17  83 D18  84 D20  85 D22  86 D24
    #
    #   Neighbourhoods (e.g. 2135 Tallaght, 2068 Blanchardstown, 2164 Lucan, 2107 Clondalkin,
    #     2261 Rathfarnham, ...) -> see docs/aucocomplete.json for the complete list.
    stored-shape-ids: ${TENANT_1_STORED_SHAPE_IDS:}
    # property-types: daft.ie ad property types (a list) sent as a "propertyType"
    # search filter. Leave blank to match all types. For residential-to-rent common
    # values are: houses, apartments, studio-apartments, flats. e.g. "houses,apartments".
    property-types: ${TENANT_1_PROPERTY_TYPES:}
    notifiers: ${TENANT_1_NOTIFIERS:email}
    ber-ratings: ${TENANT_1_BER_RATINGS:}
  # Tenant 2 — houses only. Add "2" to TENANTS_ACTIVE to enable.
  "2":
    enabled: ${TENANT_2_ENABLED:false}
    email: ${TENANT_2_EMAIL:noreply@example.com}
    section: ${TENANT_2_SECTION:residential-to-rent}
    rental-price-min: ${TENANT_2_RENTAL_PRICE_MIN:0}
    rental-price-max: ${TENANT_2_RENTAL_PRICE_MAX:0}
    num-beds-min: ${TENANT_2_NUM_BEDS_MIN:}
    num-beds-max: ${TENANT_2_NUM_BEDS_MAX:}
    stored-shape-ids: ${TENANT_2_STORED_SHAPE_IDS:}
    property-types: ${TENANT_2_PROPERTY_TYPES:}
    notifiers: ${TENANT_2_NOTIFIERS:email}
    ber-ratings: ${TENANT_2_BER_RATINGS:}

logging:
  level:
    root: INFO
    # Set to DEBUG to log every received listing (id, title, price, path)
    com.vmudrud.daftiescanner.search.client.DaftClient: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
