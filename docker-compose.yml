services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DAFT_DYNAMO_ENDPOINT: http://dynamodb-local:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    ports:
      - "8080:8080"
